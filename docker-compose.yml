services:
    postgres:
        image: postgres:latest
        container_name: duckle_postgres
        restart: unless-stopped
        env_file: .env
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - postgres-data:/var/lib/postgresql
            - ./seed/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-duckle} -d ${POSTGRES_DB:-restaurant}",
                ]
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    postgres-data:
